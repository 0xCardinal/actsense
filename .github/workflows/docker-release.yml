name: Docker Release

on:
  release:
    types: [created]

jobs:
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -e
          # Validate tag name format (semver: X.Y.Z)
          if ! echo "$RELEASE_TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid tag format. Expected semver (X.Y.Z), got: $RELEASE_TAG"
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine if this is the latest release
        id: latest
        env:
          CURRENT_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          git fetch --tags --force 2>/dev/null || true
          LATEST_TAG=$(git tag --sort=-version:refname | head -1 || echo "")
          
          if [ "$CURRENT_TAG" = "$LATEST_TAG" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/actsense
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.latest.outputs.is_latest }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
